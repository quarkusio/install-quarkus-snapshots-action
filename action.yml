name: Install Quarkus Snapshots
description: Download and install Quarkus Maven snapshot artifacts from the latest release

inputs:
  branch:
    description: The Quarkus branch to install snapshots for
    required: true
    default: main
  repository:
    description: The repository containing the Maven snapshot releases
    required: true
    default: quarkusio/quarkus-ecosystem-ci

outputs:
  quarkus-version:
    description: The Quarkus version that was installed
    value: ${{ steps.install.outputs.quarkus-version }}
  quarkus-sha:
    description: The Quarkus commit SHA from the snapshot release tag
    value: ${{ steps.install.outputs.quarkus-sha }}

permissions:
  contents: read

runs:
  using: composite
  steps:
    - name: Install Quarkus Snapshots
      id: install
      shell: bash
      run: |
        set -e

        QUARKUS_SNAPSHOT_BRANCH="${{ inputs.branch }}"
        QUARKUS_SNAPSHOT_REPO="${{ inputs.repository }}"
        PREFIX="maven-repo-${QUARKUS_SNAPSHOT_BRANCH}-"

        report_failure() {
          echo "::error::Failed to install Quarkus snapshot"
          exit 1
        }

        echo "Looking for latest Quarkus snapshot release for branch: ${QUARKUS_SNAPSHOT_BRANCH}"

        RELEASE_INFO=$(gh release list --limit 20 \
          --repo "${QUARKUS_SNAPSHOT_REPO}" \
          | grep "${PREFIX}" \
          | head -n 1)

        if [ -z "${RELEASE_INFO}" ]; then
          echo "::error::No snapshot release found for branch '${QUARKUS_SNAPSHOT_BRANCH}'"
          report_failure
        fi

        TAG=$(echo "${RELEASE_INFO}" | awk -F'\t' '{print $3}')
        PUBLISHED=$(echo "${RELEASE_INFO}" | awk -F'\t' '{print $4}')

        echo "Found release: ${TAG} (published: ${PUBLISHED})"

        RELEASE_EPOCH=$(date -d "${PUBLISHED}" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "${PUBLISHED}" +%s 2>/dev/null)
        NOW_EPOCH=$(date +%s)
        AGE_HOURS=$(( (NOW_EPOCH - RELEASE_EPOCH) / 3600 ))

        if [ "${AGE_HOURS}" -gt 36 ]; then
          echo "::error::Latest snapshot release '${TAG}' is ${AGE_HOURS} hours old (published: ${PUBLISHED}). Expected a release less than 36 hours old."
          report_failure
        fi

        echo "Downloading Quarkus snapshot: ${TAG} (age: ${AGE_HOURS} hours)"
        if ! gh release download "${TAG}" \
          --repo "${QUARKUS_SNAPSHOT_REPO}" \
          --pattern "maven-repo.tar.gz" \
          --dir /tmp; then
          report_failure
        fi

        QUARKUS_VERSION=$(tar -tzf /tmp/maven-repo.tar.gz | grep 'io/quarkus/quarkus-core/[^/]' | head -1 | sed 's|.*/quarkus-core/\([^/]*\)/.*|\1|')
        QUARKUS_SHA="${TAG#${PREFIX}}"
        echo "quarkus-version=${QUARKUS_VERSION}" >> "$GITHUB_OUTPUT"
        echo "quarkus-sha=${QUARKUS_SHA}" >> "$GITHUB_OUTPUT"

        mkdir -p ~/.m2/repository
        tar -xzf /tmp/maven-repo.tar.gz -C ~/.m2/repository
        rm -f /tmp/maven-repo.tar.gz

        echo "Quarkus ${QUARKUS_VERSION} for branch '${QUARKUS_SNAPSHOT_BRANCH}' installed successfully."
      env:
        GH_TOKEN: ${{ github.token }}
