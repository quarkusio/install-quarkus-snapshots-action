name: Install Quarkus Snapshots
description: Download and install Quarkus Maven snapshot artifacts from the latest release

inputs:
  branch:
    description: The Quarkus branch to install snapshots for
    required: true
    default: main
  repository:
    description: The repository containing the Maven snapshot releases
    required: true
    default: quarkusio/quarkus-ecosystem-ci
  fail-on-missing:
    description: Fail the build instead of building Quarkus from source when no snapshot is available
    required: false
    default: 'false'

outputs:
  quarkus-version:
    description: The Quarkus version that was installed
    value: ${{ steps.install.outputs.quarkus-version }}
  quarkus-sha:
    description: The Quarkus commit SHA from the snapshot release tag
    value: ${{ steps.install.outputs.quarkus-sha }}
  built-from-source:
    description: Whether Quarkus was built from source instead of using a snapshot
    value: ${{ steps.install.outputs.built-from-source }}

runs:
  using: composite
  steps:
    - name: Install Quarkus Snapshots
      id: install
      shell: bash
      run: |
        set -e

        QUARKUS_SNAPSHOT_BRANCH="${{ inputs.branch }}"
        QUARKUS_SNAPSHOT_REPO="${{ inputs.repository }}"
        FAIL_ON_MISSING="${{ inputs.fail-on-missing }}"
        PREFIX="maven-repo-${QUARKUS_SNAPSHOT_BRANCH}-"

        echo "Looking for latest Quarkus snapshot release for branch: ${QUARKUS_SNAPSHOT_BRANCH}"

        RELEASE_INFO=$(gh release list --limit 20 \
          --repo "${QUARKUS_SNAPSHOT_REPO}" \
          | grep "${PREFIX}" \
          | head -n 1) || true

        SNAPSHOT_AVAILABLE=true

        if [ -z "${RELEASE_INFO}" ]; then
          echo "::warning::No snapshot release found for branch '${QUARKUS_SNAPSHOT_BRANCH}'"
          SNAPSHOT_AVAILABLE=false
        fi

        if [ "${SNAPSHOT_AVAILABLE}" = "true" ]; then
          TAG=$(echo "${RELEASE_INFO}" | awk -F'\t' '{print $3}')
          echo "Found release: ${TAG}"
          echo "Downloading Quarkus snapshot: ${TAG}"
          if ! gh release download "${TAG}" \
            --repo "${QUARKUS_SNAPSHOT_REPO}" \
            --pattern "maven-repo.tar.gz" \
            --dir /tmp; then
            echo "::warning::Failed to download snapshot release '${TAG}'"
            SNAPSHOT_AVAILABLE=false
          fi
        fi

        if [ "${SNAPSHOT_AVAILABLE}" = "true" ]; then
          QUARKUS_VERSION=$(tar -tzf /tmp/maven-repo.tar.gz | grep 'io/quarkus/quarkus-core/[^/]' | head -1 | sed 's|.*/quarkus-core/\([^/]*\)/.*|\1|')
          QUARKUS_SHA="${TAG#${PREFIX}}"
          echo "quarkus-version=${QUARKUS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "quarkus-sha=${QUARKUS_SHA}" >> "$GITHUB_OUTPUT"

          mkdir -p ~/.m2/repository
          tar -tzf /tmp/maven-repo.tar.gz >> ~/.m2/.quarkus-snapshots-manifest
          tar -xzf /tmp/maven-repo.tar.gz -C ~/.m2/repository
          rm -f /tmp/maven-repo.tar.gz

          echo "built-from-source=false" >> "$GITHUB_OUTPUT"
          echo "Quarkus ${QUARKUS_VERSION} for branch '${QUARKUS_SNAPSHOT_BRANCH}' installed successfully."
        else
          if [ "${FAIL_ON_MISSING}" = "true" ]; then
            echo "::error::No usable Quarkus snapshot available and fail-on-missing is enabled"
            exit 1
          fi

          echo "No usable snapshot available. Building Quarkus from source for branch '${QUARKUS_SNAPSHOT_BRANCH}'..."
          QUARKUS_SRC=$(mktemp -d)
          git clone --depth 1 --branch "${QUARKUS_SNAPSHOT_BRANCH}" \
            "https://github.com/quarkusio/quarkus.git" "${QUARKUS_SRC}"

          QUARKUS_SHA=$(git -C "${QUARKUS_SRC}" rev-parse HEAD)
          QUARKUS_VERSION=$(mvn -f "${QUARKUS_SRC}/pom.xml" help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "quarkus-version=${QUARKUS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "quarkus-sha=${QUARKUS_SHA}" >> "$GITHUB_OUTPUT"

          echo "Building Quarkus ${QUARKUS_VERSION} (${QUARKUS_SHA})..."
          "${QUARKUS_SRC}/mvnw" -f "${QUARKUS_SRC}/pom.xml" -T0.8C -ntp -e \
            -Prelocations -DskipTests -DskipITs -Dinvoker.skip \
            -Dno-test-modules -DskipExtensionValidation -Dskip.gradle.tests \
            -Dtruststore.skip install

          rm -rf "${QUARKUS_SRC}"
          echo "built-from-source=true" >> "$GITHUB_OUTPUT"
          echo "Quarkus ${QUARKUS_VERSION} for branch '${QUARKUS_SNAPSHOT_BRANCH}' built and installed successfully."
        fi
      env:
        GH_TOKEN: ${{ github.token }}
